<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Principal</title>



  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body>


 
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand">Mi Progreso</span>
      <div class="navbar-nav ms-auto">
        <a class="nav-link btn btn-outline-danger btn-sm text-white px-3" href="index.html">Cerrar Sesión</a>
      </div>
    </div>
  </nav>




  <div class="container my-5">
    <h2 class="mb-4">Seguimiento de Salud</h2>




    <div class="card mb-5 bg-light">
      <div class="card-body">
        <form id="pesoForm" class="row g-3 align-items-end">
          <div class="col-12 col-md-4">
            <label class="form-label">Peso actual (kg)</label>
            <input id="pesoInput" type="number" step="0.1" class="form-control" placeholder="00.0" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Fecha de registro</label>
            <input id="fechaInput" type="date" class="form-control" required>
          </div>
          <div class="col-12 col-md-4">
            <button type="submit" class="btn btn-success w-100">Registrar Peso</button>
          </div>
        </form>
      </div>
    </div>



    
    <div class="mt-4">
      <h4 class="mb-3">Historial de Registros</h4>
      <div class="table-responsive">
        <table id="tablaHistorial" class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>Fecha</th>
              <th>Peso Registrado</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>


         


          </tbody>
        </table>
      </div>
    </div>



    <div class="card mt-5">
      <div class="card-body">
        <h4 class="mb-3">Evolución del Peso</h4>
        <canvas id="pesoChart"></canvas>
      </div>
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>




  
  
  <script>
   
   
    const fechas = ['2026-06-25', '2026-06-28', '2026-06-30'];
    const pesos = [74.5, 74.0, 73.8];



    const tablaBody = document.querySelector('#tablaHistorial tbody');
    function agregarFila(fecha, peso) {
      const estado = peso <= pesos[pesos.length-1] ? 'Mejorando' : 'Estable';
      const badgeClass = estado === 'Mejorando' ? 'bg-success' : 'bg-secondary';
      const fila = `
        <tr>
          <td>${fecha}</td>
          <td>${peso} kg</td>
          <td><span class="badge ${badgeClass}">${estado}</span></td>
        </tr>`;
      tablaBody.insertAdjacentHTML('beforeend', fila);
    }
    fechas.forEach((f, i) => agregarFila(f, pesos[i]));



    const ctx = document.getElementById('pesoChart').getContext('2d');
    const pesoChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: fechas,
        datasets: [{
          label: 'Peso (kg)',
          data: pesos,
          borderColor: 'blue',
          backgroundColor: 'lightblue',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: {
            display: true,
            text: 'Registro de Peso en el Tiempo'
          }
        }
      }
    });



   
    document.getElementById('pesoForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const peso = parseFloat(document.getElementById('pesoInput').value);
      const fecha = document.getElementById('fechaInput').value;

      if (!fecha || isNaN(peso)) return;



     
      fechas.push(fecha);
      pesos.push(peso);


     
      agregarFila(fecha, peso);

     
      pesoChart.update();

      
      e.target.reset();
    });


  </script>

</body>

</html>
